spring.application.name=apigateway
server.port=80
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
jwt.secret = secret
#spring.main.web-application-type=reactive
#spring.main.allow-bean-definition-overriding=true
#DEPENDENCIES FOR SPANID AND TRACE ID -DISTRIBUTED TRACING
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/
# Ensure logs include Trace and Span IDs 
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{traceId:-},%X{spanId:-}] - %msg%n


####################################	 START OF JPA CRUD DATASOURCE	########################

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/student
spring.datasource.username=studentdbuser
spring.datasource.password=Nagu@9046N
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

##Turn Statistics on and log SQL stmts
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
##If want to see very extensive logging
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.type=trace
logging.level.org.hibernate.stat=debug

#Hibernate create the schema using entity classes 
spring.jpa.hibernate.ddl-auto=update
